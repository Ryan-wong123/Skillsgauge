name: JobStreet Scraper Automation

on:
  schedule:
    - cron: '0 0 * * 0'  # Runs every sun 
  workflow_dispatch:  # Allow manual triggering

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Specify the Python version to use

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyppeteer pandas 

      - name: Run Scraper
        run: |
          python job_street_scraper/job_street_scraper.py

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # Stash any unstaged changes before pulling
      - name: Stash unstaged changes
        run: |
          git stash

      # Pull the latest changes from GitHub with rebase
      - name: Pull latest changes from GitHub
        run: |
          git pull origin main --rebase

      # Apply stashed changes
      - name: Apply stashed changes
        run: |
          git stash pop || echo "No changes to apply"
      
      # Commit and push the new data
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "scraped job street" || echo "No changes to commit"
          git push origin main
        env:
          # This GITHUB_TOKEN is automatically provided by GitHub Actions
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
