name: JobStreet Scraper Automation

on:
  # Triggers the workflow on push to the repository
  push:
    branches:
      - main
  # Triggers the workflow on a schedule (daily at midnight UTC)
  schedule:
    - cron: "0 0 * * *"  # This runs every day at midnight UTC

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Specify the Python version to use

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyppeteer pandas 

      - name: Run Scraper
        run: |
          python puppet_jobstreet.py 

      - name: Commit and push results (if necessary)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add job_street_scrape.csv
          git commit -m "Update job scrape results"
          git push origin main  
