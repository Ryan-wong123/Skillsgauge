name: Puppeteer JobStreet Web Scraper Automation

on:
  schedule:
    - cron: '0 0 * * *'  # Runs everyday
  workflow_dispatch:  # Allow manual triggering

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # Specify your Python version

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            fonts-liberation \
            libappindicator3-1 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libgdk-pixbuf2.0-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            xdg-utils \
            libgbm-dev \
            xvfb  # Install xvfb for simulating a display

      - name: Install Pyppeteer
        run: |
          python -m pip install pyppeteer

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r jobStreet_Scraper_requirement.txt  # Ensure you have this file in your repo

      - name: Run Puppeteer Script
        run: |
          # Run the script using Xvfb to simulate a display
          nohup Xvfb :99 &  # Start virtual framebuffer
          export DISPLAY=:99
          python puppet_jobstreet.py
        env:
          DISPLAY: :99  # Ensure DISPLAY variable is set

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # Stash any unstaged changes before pulling
      - name: Stash unstaged changes
        run: |
          git stash

      # Pull the latest changes from GitHub with rebase
      - name: Pull latest changes from GitHub
        run: |
          git pull origin main --rebase

      # Apply stashed changes
      - name: Apply stashed changes
        run: |
          git stash pop || echo "No changes to apply"
      
      # Commit and push the new data
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Scraped job street" || echo "No changes to commit"
          git push origin main
        env:
          # This GITHUB_TOKEN is automatically provided by GitHub Actions
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
