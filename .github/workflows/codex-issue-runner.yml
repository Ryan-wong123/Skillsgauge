name: Codex Issue Runner

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex_issue_fix:
    if: github.event.label.name == 'codex-run'
    runs-on: ubuntu-latest

    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Codex on issue
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are Codex working on the repository: ${{ github.repository }}

            A GitHub issue has been labeled for automation.

            Issue number: ${{ github.event.issue.number }}
            Issue URL: ${{ github.event.issue.html_url }}

            Issue title:
            ${{ github.event.issue.title }}

            Issue body:
            ${{ github.event.issue.body }}

            Follow AGENTS.md if present.

            Important rules:
            - Work on the actual application code, not the automation files, unless the issue is explicitly about GitHub Actions, workflows, prompts, or CI/CD.
            - Do not modify files under .github/ unless the issue is explicitly about automation or repository configuration.
            - Keep changes scoped to the issue.
            - Avoid unrelated refactors.
            - Prefer minimal, reviewable changes.
            - If the issue is ambiguous, make the safest minimal assumption and state it in the summary.

            Project hints for SkillGauge:
            - Main Flask app entry point: app.py
            - Resume extraction logic likely involves resume_skills_extractor.py
            - Analysis logic is likely in data_analysis.py
            - Charts/visualisations are likely in Analysis_Visualisation.py
            - HTML templates are in templates/
            - Static assets are in static/
            - Uploaded resumes are handled through uploads/

            Your task:
            1. Read the issue carefully.
            2. Inspect the repository.
            3. Implement the requested feature or bug fix in the app code.
            4. Do not edit workflow or prompt files unless the issue explicitly asks for it.
            5. Stop after making the changes needed for a pull request.

            At the end, summarize:
            - what changed
            - which files changed
            - any assumptions made
            - any follow-up work still needed
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
          codex-args: >-
            ["--full-auto"]

      - name: Create pull request from Codex changes
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "Codex: resolve issue #${{ github.event.issue.number }}"
          branch: codex/issue-${{ github.event.issue.number }}
          title: "Codex: resolve issue #${{ github.event.issue.number }}"
          body: |
            Automated changes generated by Codex for issue #${{ github.event.issue.number }}.

            Issue:
            ${{ github.event.issue.html_url }}

            Codex summary:
            ${{ steps.run_codex.outputs.final-message }}

      - name: Comment on issue with PR link
        if: steps.cpr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Codex has created a pull request for this issue:\n\n${process.env.PR_URL}`
            });
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}

      - name: Comment if no PR was created
        if: steps.cpr.outputs.pull-request-url == ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Codex finished running, but no pull request was created automatically.\n\nFinal message:\n\n${process.env.FINAL_MESSAGE}`
            });
        env:
          FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}