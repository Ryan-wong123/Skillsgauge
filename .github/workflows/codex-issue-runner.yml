name: Codex Issue Runner

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex_issue_fix:
    if: github.event.label.name == 'codex-run'
    runs-on: ubuntu-latest

    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Codex on issue
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/issue-fix.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
          codex-args: >-
            ["--full-auto"]

        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPO_NAME: ${{ github.repository }}

      - name: Create pull request from Codex changes
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "Codex: resolve issue #${{ github.event.issue.number }}"
          branch: codex/issue-${{ github.event.issue.number }}
          title: "Codex: resolve issue #${{ github.event.issue.number }}"
          body: |
            Automated changes generated by Codex for issue #${{ github.event.issue.number }}.

            Issue:
            ${{ github.event.issue.html_url }}

            Codex summary:
            ${{ steps.run_codex.outputs.final-message }}

      - name: Comment on issue with PR link
        if: steps.cpr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Codex has created a pull request for this issue:\n\n${process.env.PR_URL}`
            });
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}

      - name: Comment if no PR was created
        if: steps.cpr.outputs.pull-request-url == ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Codex finished running, but no pull request was created automatically.\n\nFinal message:\n\n${process.env.FINAL_MESSAGE}`
            });
        env:
          FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}